version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Keep init/analyze on one commit so CodeQL never runs mixed action SHAs.
    groups:
      codeql-action-family:
        patterns:
          - github/codeql-action/*
  - package-ecosystem: pip
    directory: /bridge
    schedule:
      interval: weekly
