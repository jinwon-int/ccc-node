name: harness-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-harness:
    name: validate-harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install jq + shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq shellcheck
      - name: Validate harness (JSON, shell syntax, shellcheck, hook tests, frontmatter)
        env:
          TMPDIR: ${{ runner.temp }}/ccc-tmp
        run: |
          mkdir -p "$TMPDIR"
          bash scripts/validate-harness.sh

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install lint tools
        run: |
          python -m pip install --require-hashes -r .github/requirements/bridge-ci.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy (focused subset)
        env:
          PYTHONPATH: ${{ github.workspace }}/.github/pythonpath
        run: mypy
      - name: CI hardening regressions
        run: python -m pytest -q tests/test_ci_pip_hash_pinning.py tests/test_workflow_permissions.py tests/test_codeowners_branch_protection.py tests/test_ci_required_contexts.py

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Gitleaks
        run: gitleaks detect --source . -c .gitleaks.toml --no-banner

  bridge-tests:
    name: bridge-tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install bridge
        run: |
          python -m pip install --require-hashes -r .github/requirements/bridge-ci.txt
      - name: Run bridge tests with coverage
        working-directory: bridge
        env:
          TMPDIR: ${{ runner.temp }}/ccc-tmp
          PYTHONPATH: ${{ github.workspace }}/.github/pythonpath
        run: |
          mkdir -p "$TMPDIR"
          python -m pytest -q --cov=telegram_bot --cov-report=term --cov-report=xml
      - name: Upload bridge coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bridge-coverage
          path: bridge/coverage.xml
