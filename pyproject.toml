[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "C90"]
# Keep the first CI gate focused on pycodestyle/pyflakes correctness. Import
# sorting, pyupgrade rewrites, bugbear, simplify, and broad line wrapping are
# intentionally deferred so this PR does not create repo-wide churn before the
# bridge refactor/packaging work.
ignore = ["E501"]

[tool.ruff.lint.mccabe]
# Complexity regression gate (issue #348): new functions above CC 15 fail CI.
# Pre-existing hotspots carry an explicit, per-function `# noqa: C901`
# baseline marker so the exception list stays review-visible in the diff that
# touches it; do not add new markers without refactoring being infeasible.
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
# These files deliberately patch sys.modules/sys.path or bootstrap the script
# before importing runtime modules; keep the exception scoped and auditable.
"bridge/tests/test_duration_log.py" = ["E402"]
"bridge/tests/test_heartbeat_format.py" = ["E402"]
"scripts/agent_cron.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
warn_unused_ignores = true
no_implicit_optional = true
ignore_missing_imports = true
mypy_path = "bridge"
explicit_package_bases = true
files = [
  "bridge/core",
  "bridge/memory/codex_exec_backend.py",
  "bridge/memory/distill_journal.py",
  "bridge/memory/distill_types.py",
  "bridge/memory/distill_worker.py",
  "bridge/tests/runtime_conformance.py",
  "bridge/tests/test_agent_runtime_contract.py",
  "bridge/tests/test_codex_app_server.py",
  "bridge/tests/test_codex_runtime.py",
  "bridge/tests/test_provider_capabilities.py",
  "bridge/tests/test_runtime_conformance.py",
  "scripts/agent_cron_lib.py",
  "scripts/agent_cron_schema.py",
  "scripts/agent_cron_model.py",
  "scripts/agent_cron_repository.py",
]

# Baseline exception (issue #348): the TelegramBot mixin modules reference
# attributes provided by the composing class, which mypy cannot see until the
# typed-composition/AppContext refactor lands. Only attr-defined is disabled,
# only for these modules, so every other error class still gates them and new
# modules get full checking. Any change to this list is review-visible here.
[[tool.mypy.overrides]]
module = [
  "core.bot_access",
  "core.bot_commands",
  "core.bot_delivery",
  "core.bot_lifecycle",
  "core.bot_status",
  "core.bot_voice",
  "core.project_chat_history",
]
disable_error_code = ["attr-defined"]
